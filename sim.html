<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>throughline — sim</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0b;--text:#ece9e3;--mut:#8a877f;--faint:#56544e;--line:#222226;--soft:#18181b;--bone:#d6cfbf;--ok:#88a08a;--serif:'Spectral',Georgia,serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-family:var(--serif)}
.wrap{max-width:600px;margin:0 auto;padding:28px 20px 80px}
.lab{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint)}
.mono{font-family:var(--mono)}
hr{height:1px;background:var(--line);border:none;margin:20px 0}
button{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;background:none;border:1px solid var(--line);color:var(--mut);cursor:pointer;padding:10px 16px;transition:all .2s}
button:hover{border-color:var(--mut);color:var(--text)}
button.big{font-size:13px;padding:18px;width:100%;border-color:var(--bone);color:var(--bone)}
button.big:hover{background:var(--bone);color:var(--bg)}
button.accept{border-color:var(--ok);color:var(--ok)}
button.accept:hover{background:var(--ok);color:var(--bg)}
button.skip{border-color:var(--faint);color:var(--faint)}
.file-btn{display:inline-block;cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);border:1px solid var(--line);padding:8px 14px;transition:all .2s}
.file-btn:hover{border-color:var(--mut);color:var(--text)}
input[type=file]{display:none}
.dur-in{font-family:var(--mono);font-size:15px;color:var(--text);background:transparent;border:none;border-bottom:1px solid var(--bone);width:60px;text-align:right;outline:none;padding:2px 4px}
.pick-box{border:1px solid var(--line);padding:24px;margin:18px 0}
.pick-name{font-size:22px;font-weight:300;line-height:1.3;margin-bottom:6px}
.pick-action{font-family:var(--mono);font-size:12px;color:var(--mut);margin-bottom:10px}
.pick-meta{font-family:var(--mono);font-size:10px;color:var(--faint);margin-bottom:14px}
.dur-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.dur-row .lab{margin:0}
.actions-row{display:flex;gap:10px}
.actions-row button{flex:1}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
th{text-align:left;color:var(--faint);font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:6px 8px 6px 0;border-bottom:1px solid var(--line)}
td{padding:7px 8px 7px 0;border-bottom:1px solid var(--soft);color:var(--mut);vertical-align:top}
td.name{color:var(--text)}
td.force{color:var(--bone)}
.bar{height:3px;background:var(--line);margin-top:4px;border-radius:2px}
.bar-fill{height:3px;background:var(--bone);border-radius:2px;transition:width .3s}
.bar-fill.ok{background:var(--ok)}
.tag{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border:1px solid var(--line);color:var(--faint)}
.status-line{font-family:var(--mono);font-size:10px;color:var(--faint);min-height:16px;margin:6px 0}
.evening-bar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.night-tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;border:1px solid var(--line);color:var(--mut)}
.night-tag.work{border-color:#7d96a3;color:#7d96a3}
.tally{font-family:var(--mono);font-size:12px;color:var(--text)}
.tally .t-sub{color:var(--faint);font-size:10px}
.dom-row{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;margin:5px 0}
.dom-dot{width:8px;height:8px;border-radius:50%;flex:none}
.dom-bar{height:6px;border-radius:3px;flex:1;background:var(--soft);overflow:hidden}
.dom-fill{height:6px}
[hidden]{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div style="margin-bottom:24px">
    <div class="lab" style="margin-bottom:12px">throughline — simulateur</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <label class="file-btn" for="f-cat">catalogue <input type="file" id="f-cat" accept=".json"></label>
      <label class="file-btn" for="f-log">log de départ (option) <input type="file" id="f-log" accept=".json"></label>
      <button onclick="resetSim()" style="border-color:var(--faint);color:var(--faint)">reset</button>
    </div>
    <div class="status-line" id="status">— charge un catalogue pour commencer</div>
  </div>

  <div id="sim" hidden>
    <hr>

    <!-- evening header -->
    <div class="evening-bar">
      <div>
        <div class="lab" style="margin-bottom:4px">soirée</div>
        <div class="tally" id="day-label"></div>
      </div>
      <div style="text-align:right">
        <div class="night-tag" id="night-tag" onclick="toggleNight()" style="cursor:pointer"></div>
      </div>
    </div>
    <div class="tally" id="tally" style="margin:10px 0 4px"></div>

    <!-- pick -->
    <button class="big" id="btn-propose" onclick="propose()" style="margin-top:14px">proposer</button>

    <div id="pick-area" hidden>
      <div class="pick-box">
        <div class="pick-name" id="pick-name"></div>
        <div class="pick-action" id="pick-action"></div>
        <div class="pick-meta" id="pick-meta"></div>
        <div class="dur-row">
          <span class="lab">durée</span>
          <input class="dur-in" id="dur-in" type="number" min="1" step="1" inputmode="numeric">
          <span class="lab">min</span>
        </div>
        <div class="actions-row">
          <button class="accept" onclick="accept()">accepter ✓</button>
          <button class="skip" onclick="skip()">passer ✗</button>
        </div>
      </div>
    </div>

    <div id="empty-msg" hidden style="font-family:var(--mono);font-size:12px;color:var(--faint);padding:18px 0">
      aucune activité éligible ce soir — clôture la soirée.
    </div>

    <div style="display:flex;gap:10px;margin-top:16px">
      <button onclick="closeEvening()" style="flex:1">fin de soirée →</button>
      <button onclick="renderVerdict()" style="flex:1;border-color:var(--bone);color:var(--bone)">verdict semaine</button>
    </div>

    <!-- weights -->
    <hr>
    <div class="lab" style="margin-bottom:12px">poids ce soir (déterministe, sans jitter)</div>
    <table>
      <thead><tr><th>activité</th><th>retard</th><th style="text-align:right">force</th></tr></thead>
      <tbody id="wtable"></tbody>
    </table>

    <!-- verdict -->
    <div id="verdict" hidden>
      <hr>
      <div class="lab" style="margin-bottom:14px">verdict — couverture & faisabilité</div>
      <div id="verdict-body"></div>
    </div>
  </div>
</div>

<script>
// ===== engine (copie conforme de index.html) =====
const pad = (n) => String(n).padStart(2, "0");
const keyOf = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fromKey = (s) => new Date(s + "T00:00:00");
const daysBetween = (a, b) => Math.round((fromKey(b) - fromKey(a)) / 86400000);
const uid = () => Math.random().toString(36).slice(2, 9);
const isDone = (e) => e.type !== "skip";
const fmtMin = (m) => { m = Math.round(m); if (!m) return "0m"; if (m < 60) return m+"m"; const h = Math.floor(m/60), r = m%60; return r ? `${h}h${pad(r)}` : `${h}h`; };

// horloge simulée — pilotée par le sim
let SIM_DATE = keyOf(new Date());
const todayKey = () => SIM_DATE;
const daysAgoKey = (n) => { const d = fromKey(SIM_DATE); d.setDate(d.getDate()-n); return keyOf(d); };

function doneLast7(log, id) {
  const since = daysAgoKey(6);
  return log.filter((e) => e.date >= since && e.activityId === id && isDone(e)).length;
}
function minutesToday(log, id) {
  const t = todayKey();
  return log.filter((e) => e.date === t && e.activityId === id && isDone(e)).reduce((s, e) => s + (e.min || 0), 0);
}
function daysSinceLast(log, id) {
  let last = null;
  for (const e of log) if (e.activityId === id && isDone(e) && (!last || e.date > last)) last = e.date;
  return last ? daysBetween(last, todayKey()) : 999;
}
function daysSinceLastAction(log, id, actionId) {
  let last = null;
  for (const e of log) if (e.activityId === id && e.actionId === actionId && isDone(e) && (!last || e.date > last)) last = e.date;
  return last ? daysBetween(last, todayKey()) : 999;
}
const OVERDUE_CAP = 3, BONUS_MULT = 0.4;
function forceFrom(daysSince, perWeek, bonus) {
  const jit = 0.7 + Math.random() * 0.6;
  const pw = perWeek > 0 ? perWeek : 0.5;
  const interval = 7 / pw;
  const overdue = Math.min(OVERDUE_CAP, daysSince / interval);
  let f = Math.sqrt(pw) * overdue * jit;
  if (bonus) f *= BONUS_MULT;
  return Math.max(0.02, f);
}
function forceBase(daysSince, perWeek, bonus) { // sans jitter, pour l'affichage
  const pw = perWeek > 0 ? perWeek : 0.5;
  const overdue = Math.min(OVERDUE_CAP, daysSince / (7 / pw));
  let f = Math.sqrt(pw) * overdue;
  if (bonus) f *= BONUS_MULT;
  return Math.max(0, f);
}
function weight(a, log) {
  if (a.kind === "task" && a.deadline) {
    const d = daysBetween(todayKey(), a.deadline);
    if (d <= 0) return 60; if (d <= 2) return 14; if (d <= 7) return 5; return 2;
  }
  return forceFrom(daysSinceLast(log, a.id), a.perWeek, a.bonus);
}
const isPerAction = (a) => Array.isArray(a.actions) && a.actions.some((ac) => typeof ac.perWeek === "number");
function actionWeight(a, ac, log) {
  return forceFrom(daysSinceLastAction(log, a.id, ac.id), ac.perWeek, a.bonus || ac.bonus);
}
function placeOk(a, place) {
  if (place === "work") return a.where === "anywhere";
  if (place === "out") return a.where === "out" || a.where === "anywhere";
  return a.where === "home" || a.where === "anywhere" || a.where === "out";
}
function cooldownOk(a, log) {
  if (!a.cooldownH) return true;
  const cutoff = Date.now() - a.cooldownH * 3600000;
  for (const e of log) if (e.activityId === a.id && isDone(e) && e.ts >= cutoff) return false;
  return true;
}
function pipelineStep(a) {
  const stages = a.stages || [];
  if (!stages.length) return null;
  const last = stages.length - 1;
  const label = (i) => (stages[i] ? stages[i].text : "—");
  const pieces = (a.items || []).filter((it) => typeof it.stage === "number");
  const live = pieces.filter((p) => p.stage < last);
  const freshChance = live.length ? Math.min(0.5, 1 / (live.length + 1)) : 1;
  if (Math.random() < freshChance)
    return { id: uid(), text: `${label(0)} — nouvelle pièce`, min: 15, pieceId: null, pieceStage: 0, fresh: true };
  const chosen = live.map((p) => ({ p, w: (p.stage + 1) * (0.7 + Math.random() * 0.6) })).sort((x, y) => y.w - x.w)[0].p;
  return { id: uid(), text: `${label(chosen.stage)} — « ${chosen.text} »`, min: 15, pieceId: chosen.id, pieceStage: chosen.stage, fresh: false };
}
function hasDoingItems(a) {
  return a.kind === "practice" && (a.items || []).some((it) => it.status === "doing");
}
function itemStep(a, log) {
  const base = a.actions[0] || { id: uid(), text: "—", min: 15 };
  const doing = (a.items || []).filter((it) => it.status === "doing");
  if (!doing.length) return base;
  const scored = doing.map((it) => {
    let last = null;
    for (const e of log) if (e.activityId === a.id && isDone(e) && e.itemId === it.id && (!last || e.date > last)) last = e.date;
    const days = last ? daysBetween(last, todayKey()) : 999;
    return { it, w: days * (0.7 + Math.random() * 0.6) };
  });
  const pick = scored.sort((x, y) => y.w - x.w)[0].it;
  return { id: base.id, text: pick.text, min: base.min, itemId: pick.id };
}
function pick(activities, log, place, maxMin = null, relax = false, avoidId = null) {
  const elig = [];
  for (const a of activities) {
    if (a.kind === "task" && a.done) continue;
    if (a.id === avoidId) continue;
    if (!relax) {
      if (a.capMin > 0 && minutesToday(log, a.id) >= a.capMin) continue;
      if (a.capWeek > 0 && doneLast7(log, a.id) >= a.capWeek) continue;
      if (!cooldownOk(a, log)) continue;
    }
    if (!placeOk(a, place)) continue;
    if (a.kind === "pipeline") {
      if (!(a.stages || []).length) continue;
      elig.push({ a, acts: null, w: weight(a, log) });
    } else if (isPerAction(a)) {
      for (const ac of a.actions) {
        if (maxMin != null && ac.min > maxMin) continue;
        elig.push({ a, acts: [ac], w: actionWeight(a, ac, log) });
      }
    } else {
      const acts = a.actions.filter((ac) => maxMin == null || ac.min <= maxMin);
      if (!acts.length) continue;
      elig.push({ a, acts, w: weight(a, log) });
    }
  }
  if (!elig.length) return null;
  const total = elig.reduce((s, e) => s + e.w, 0);
  let r = Math.random() * total, chosen = elig[0];
  for (const e of elig) { if (r < e.w) { chosen = e; break; } r -= e.w; }
  const action = chosen.a.kind === "pipeline"
    ? pipelineStep(chosen.a)
    : hasDoingItems(chosen.a)
      ? itemStep(chosen.a, log)
      : chosen.acts[Math.floor(Math.random() * chosen.acts.length)];
  if (!action) return null;
  return { activity: chosen.a, action };
}

// quelle nuit ? même règle que isWorkShift : jeu/ven/sam + dim alterné (ancre 7 juin 2026)
function isWorkNight(dateKey) {
  const d = fromKey(dateKey), day = d.getDay();
  if (day === 4 || day === 5 || day === 6) return true;
  if (day === 0) {
    const a = new Date(2026, 5, 7); a.setHours(0,0,0,0);
    const s = new Date(d); s.setHours(0,0,0,0);
    const weeks = Math.round((s - a) / (7 * 86400000));
    return ((weeks % 2) + 2) % 2 === 0;
  }
  return false;
}

// ===== état sim =====
let activities = [];
let simLog = [];           // sessions acceptées { date, min, ... }
let currentPick = null;
let proposedIds = new Set();   // toute activité jamais proposée
let playedEvenings = [];       // dates de soirées clôturées
let nightOverride = {};        // dateKey -> bool (forcer boulot/libre)
const DAYS = ["dim","lun","mar","mer","jeu","ven","sam"];

const place = () => (isNight() ? "work" : "home");
const isNight = () => (SIM_DATE in nightOverride) ? nightOverride[SIM_DATE] : isWorkNight(SIM_DATE);

// ===== chargement =====
document.getElementById("f-cat").addEventListener("change", (e) => {
  const f = e.target.files[0]; if (!f) return;
  f.text().then((t) => {
    try {
      const data = JSON.parse(t);
      activities = Array.isArray(data) ? data : (data.activities || []);
      document.getElementById("status").textContent = `${activities.length} activités chargées`;
      document.getElementById("sim").hidden = false;
      renderAll();
    } catch { document.getElementById("status").textContent = "erreur JSON — vérifie le fichier"; }
  });
});
document.getElementById("f-log").addEventListener("change", (e) => {
  const f = e.target.files[0]; if (!f) return;
  f.text().then((t) => {
    try {
      const data = JSON.parse(t);
      simLog = (Array.isArray(data) ? data : (data.log || [])).map((x) => ({ ...x }));
      document.getElementById("status").textContent = `log de départ chargé — ${simLog.length} entrées`;
      renderAll();
    } catch { document.getElementById("status").textContent = "erreur log JSON"; }
  });
});

// ===== soirée =====
function renderDay() {
  const d = fromKey(SIM_DATE);
  document.getElementById("day-label").textContent =
    `${DAYS[d.getDay()]} ${d.getDate()} ${d.toLocaleDateString("fr-FR",{month:"long"})}`;
  const tag = document.getElementById("night-tag");
  if (isNight()) { tag.textContent = "nuit de boulot"; tag.classList.add("work"); }
  else { tag.textContent = "soirée libre"; tag.classList.remove("work"); }
}
function renderTally() {
  const today = simLog.filter((e) => e.date === SIM_DATE && isDone(e));
  const mins = today.reduce((s, e) => s + (e.min || 0), 0);
  document.getElementById("tally").innerHTML = today.length
    ? `ce soir — ${today.length} action${today.length>1?"s":""} · ${fmtMin(mins)} <span class="t-sub">(${today.map((e)=>e.actionText).join(" · ")})</span>`
    : `<span class="t-sub">ce soir — rien encore</span>`;
}
function toggleNight() { nightOverride[SIM_DATE] = !isNight(); clearPick(); renderAll(); }
function closeEvening() {
  if (!playedEvenings.includes(SIM_DATE)) playedEvenings.push(SIM_DATE);
  const d = fromKey(SIM_DATE); d.setDate(d.getDate()+1); SIM_DATE = keyOf(d);
  clearPick(); document.getElementById("verdict").hidden = true; renderAll();
}

// ===== proposer / accepter / passer =====
function propose() {
  const p = pick(activities, simLog, place());
  document.getElementById("empty-msg").hidden = !!p;
  document.getElementById("pick-area").hidden = !p;
  if (!p) { currentPick = null; return; }
  currentPick = p;
  proposedIds.add(p.activity.id);
  document.getElementById("pick-name").textContent = p.activity.name;
  document.getElementById("pick-action").textContent = p.action.text;
  const dsl = daysSinceLast(simLog, p.activity.id);
  document.getElementById("pick-meta").textContent =
    `${p.activity.domain} · dernier ${dsl >= 999 ? "jamais" : "il y a "+dsl+"j"}`;
  document.getElementById("dur-in").value = p.action.min || 15;
}
function accept() {
  if (!currentPick) return;
  const min = Math.max(1, parseInt(document.getElementById("dur-in").value) || currentPick.action.min || 15);
  simLog.push({
    id: uid(), date: SIM_DATE, ts: Date.now(), type: "done",
    activityId: currentPick.activity.id, actionId: currentPick.action.id,
    actionText: currentPick.action.text, min, sec: min * 60,
    domain: currentPick.activity.domain, note: "",
    ...(currentPick.action.itemId ? { itemId: currentPick.action.itemId } : {}),
  });
  clearPick(); renderAll();
}
function skip() { clearPick(); }
function clearPick() {
  currentPick = null;
  document.getElementById("pick-area").hidden = true;
  document.getElementById("empty-msg").hidden = true;
}

// ===== table des poids =====
function renderWeights() {
  const rows = [];
  for (const a of activities) {
    if (a.kind === "task" && a.done) continue;
    const blockReason =
      !placeOk(a, place()) ? "lieu"
      : !cooldownOk(a, simLog) ? "cooldown"
      : (a.capMin > 0 && minutesToday(simLog, a.id) >= a.capMin) ? "cap min"
      : (a.capWeek > 0 && doneLast7(simLog, a.id) >= a.capWeek) ? "cap sem"
      : null;
    if (blockReason) { rows.push({ label: a.name, elig: false, force: 0, dsl: daysSinceLast(simLog, a.id), reason: blockReason, bonus: a.bonus }); continue; }
    if (isPerAction(a)) {
      for (const ac of a.actions) {
        const dsl = daysSinceLastAction(simLog, a.id, ac.id);
        rows.push({ label: `${a.name} — ${ac.text}`, elig: true, force: forceBase(dsl, ac.perWeek, a.bonus || ac.bonus), dsl, bonus: a.bonus || ac.bonus });
      }
    } else {
      const dsl = daysSinceLast(simLog, a.id);
      rows.push({ label: a.name, elig: true, force: forceBase(dsl, a.perWeek, a.bonus), dsl, bonus: a.bonus });
    }
  }
  rows.sort((x, y) => (y.elig - x.elig) || (y.force - x.force));
  const maxF = Math.max(...rows.map((r) => r.force), 0.01);
  document.getElementById("wtable").innerHTML = rows.map((r) => {
    const dslStr = r.dsl >= 999 ? "jamais" : r.dsl === 0 ? "auj." : r.dsl + "j";
    const barW = Math.round((r.force / maxF) * 100);
    const dim = r.elig ? "" : "opacity:.35";
    const name = `<td class="name" style="${dim}">${r.label}${r.bonus ? ' <span class="tag">bonus</span>' : ""}${!r.elig ? ` <span class="tag">${r.reason}</span>` : ""}</td>`;
    return `<tr>${name}
      <td style="width:46px;${dim}"><div>${dslStr}</div><div class="bar"><div class="bar-fill" style="width:${barW}%"></div></div></td>
      <td class="force" style="text-align:right;width:42px;${dim}">${r.force > 0 ? r.force.toFixed(2) : "—"}</td></tr>`;
  }).join("");
}

// ===== verdict =====
function dColor(k) { return ({physical:"#88a08a",creative:"#b09277",learning:"#7e8a99",rest:"#ad8f9a",mind:"#9b8aa0",social:"#7d96a3",chore:"#807d76"})[k] || "#807d76"; }
function renderVerdict() {
  const done = simLog.filter(isDone);
  const dates = new Set(playedEvenings);
  done.forEach((e) => dates.add(e.date));
  const evCount = Math.max(dates.size, 1);
  const weeks = evCount / 7;

  // temps par soirée
  const byEve = {};
  done.forEach((e) => { byEve[e.date] = (byEve[e.date] || 0) + (e.min || 0); });
  const allDates = [...dates].sort();
  const totalMin = done.reduce((s, e) => s + (e.min || 0), 0);
  const workMin = done.filter((e) => isWorkNight(e.date)).reduce((s, e) => s + (e.min || 0), 0);
  const offMin = totalMin - workMin;

  // couverture par activité (et par action si per-action)
  const cov = [];
  for (const a of activities) {
    if (a.kind === "task") continue;
    if (isPerAction(a)) {
      for (const ac of a.actions) {
        const c = done.filter((e) => e.activityId === a.id && e.actionId === ac.id).length;
        cov.push({ label: `${a.name} — ${ac.text}`, count: c, target: ac.perWeek * weeks });
      }
    } else {
      const c = done.filter((e) => e.activityId === a.id).length;
      cov.push({ label: a.name, count: c, target: (a.perWeek || 0) * weeks });
    }
  }
  cov.sort((x, y) => (x.count / Math.max(x.target, 0.1)) - (y.count / Math.max(y.target, 0.1)));

  // jamais proposé
  const neverProposed = activities.filter((a) => !(a.kind === "task" && a.done) && !proposedIds.has(a.id)).map((a) => a.name);

  // domaines (en temps)
  const byDom = {};
  done.forEach((e) => { byDom[e.domain] = (byDom[e.domain] || 0) + (e.min || 0); });
  const domMax = Math.max(...Object.values(byDom), 1);

  let html = "";
  html += `<div class="tally" style="margin-bottom:4px">${evCount} soirée${evCount>1?"s":""} jouée${evCount>1?"s":""} · ${fmtMin(totalMin)} au total</div>`;
  html += `<div class="tally t-sub" style="margin-bottom:16px">≈ ${fmtMin(totalMin/evCount)}/soir · libre ${fmtMin(offMin)} · boulot ${fmtMin(workMin)}</div>`;

  // soirées
  html += `<div class="lab" style="margin:14px 0 8px">temps par soirée</div>`;
  html += allDates.map((d) => {
    const m = byEve[d] || 0;
    const w = isWorkNight(d);
    return `<div class="dom-row"><span style="width:74px;color:${w?"#7d96a3":"var(--mut)"}">${DAYS[fromKey(d).getDay()]} ${fromKey(d).getDate()}/${pad(fromKey(d).getMonth()+1)}</span>
      <div class="dom-bar"><div class="dom-fill" style="width:${Math.round(m/Math.max(...Object.values(byEve),1)*100)}%;background:${w?"#7d96a3":"var(--bone)"}"></div></div>
      <span style="width:54px;text-align:right;color:var(--text)">${fmtMin(m)}</span></div>`;
  }).join("");

  // domaines
  html += `<div class="lab" style="margin:18px 0 8px">équilibre des domaines (temps)</div>`;
  html += Object.entries(byDom).sort((a,b)=>b[1]-a[1]).map(([k,m]) =>
    `<div class="dom-row"><span class="dom-dot" style="background:${dColor(k)}"></span>
     <span style="width:70px">${k}</span>
     <div class="dom-bar"><div class="dom-fill" style="width:${Math.round(m/domMax*100)}%;background:${dColor(k)}"></div></div>
     <span style="width:54px;text-align:right;color:var(--text)">${fmtMin(m)}</span></div>`
  ).join("");

  // couverture
  html += `<div class="lab" style="margin:18px 0 8px">couverture — réalisé / cible (sur ${weeks.toFixed(1)} sem)</div>`;
  html += `<table><tbody>` + cov.map((r) => {
    const ratio = r.target > 0 ? r.count / r.target : (r.count > 0 ? 1 : 0);
    const okCls = ratio >= 0.85 ? "ok" : "";
    const tgt = r.target > 0 ? r.target.toFixed(1) : "—";
    return `<tr><td class="name">${r.label}</td>
      <td style="width:80px"><div class="bar"><div class="bar-fill ${okCls}" style="width:${Math.min(100,Math.round(ratio*100))}%"></div></div></td>
      <td class="force" style="text-align:right;width:64px">${r.count} / ${tgt}</td></tr>`;
  }).join("") + `</tbody></table>`;

  if (neverProposed.length)
    html += `<div class="lab" style="margin:18px 0 6px">jamais proposé</div><div class="tally t-sub">${neverProposed.join(" · ")}</div>`;

  document.getElementById("verdict-body").innerHTML = html;
  document.getElementById("verdict").hidden = false;
  document.getElementById("verdict").scrollIntoView({ behavior: "smooth" });
}

// ===== reset / render =====
function renderAll() { renderDay(); renderTally(); renderWeights(); }
function resetSim() {
  simLog = []; proposedIds = new Set(); playedEvenings = []; nightOverride = {};
  SIM_DATE = keyOf(new Date()); currentPick = null;
  document.getElementById("verdict").hidden = true;
  clearPick();
  if (activities.length) { renderAll(); document.getElementById("status").textContent = `remis à zéro — ${activities.length} activités`; }
}
renderDay();
</script>
</body>
</html>
